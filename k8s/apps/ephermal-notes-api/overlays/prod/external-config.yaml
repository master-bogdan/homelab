apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ephermal-notes-api-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-prod
  target:
    name: ephermal-notes-api-secret
    creationPolicy: Owner
  data:
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: kv/prod/ephermal-notes-api
        property: redis_password
