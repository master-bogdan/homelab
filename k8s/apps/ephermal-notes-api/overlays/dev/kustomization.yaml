# k8s/apps/ephermal-notes-api/overlays/dev/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev-apps
resources:
  - ../../base
  - secret.yaml

patches:
  - target:
      kind: ConfigMap
      name: ephermal-notes-api-config
    path: configmap-patch.yaml
  - target:
      kind: HTTPRoute
      name: http-ephermal-notes-api
    path: httproute-patch.yaml
