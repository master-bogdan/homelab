server:
  dataStorage:
    enabled: true
    size: 1Gi
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule
  extraInitContainers:
    - name: volume-permissions
      image: busybox:1.36
      command:
        - sh
        - -ec
        - chown -R 100:1000 /vault/data && chmod -R ug+rwX /vault/data
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        allowPrivilegeEscalation: false
      volumeMounts:
        - name: data
          mountPath: /vault/data

injector:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

ui:
  enabled: true
