# --- Basic image & service ---
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: false
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0

service:
  type: ClusterIP
  port: 5678
  name: http

ingress:
  enabled: false

podSecurityContext:
  fsGroup: 0
  fsGroupChangePolicy: OnRootMismatch

image:
  repository: n8nio/n8n
  pullPolicy: IfNotPresent

nodes:
  builtin:
    enabled: true

main:
  extraEnvVars:
    N8N_SECURE_COOKIE: "true"
  extraSecretNamesForEnvFrom:
    - n8n-prod
  persistence:
    enabled: true
    volumeName: "n8n-main-data"
    mountPath: "/home/node/.n8n"
    size: 10Gi
    accessMode: ReadWriteOnce

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

db:
  type: postgresdb

# Prod DB and Redis are external, so connection details come from the shared
# Vault-backed secret via envFrom at runtime.
externalPostgresql:
  existingSecret: "n8n-prod"

externalRedis:
  existingSecret: "n8n-prod"

worker:
  mode: queue
  count: 2
  concurrency: 10
  extraEnvVars:
    N8N_SECURE_COOKIE: "true"
  extraSecretNamesForEnvFrom:
    - n8n-prod

webhook:
  mode: queue
  count: 2
  url: "https://n8n.example.invalid"
  extraEnvVars:
    N8N_SECURE_COOKIE: "true"
  extraSecretNamesForEnvFrom:
    - n8n-prod
  mcp:
    extraSecretNamesForEnvFrom:
      - n8n-prod

encryptionKey: ""
existingEncryptionKeySecret: "n8n-prod"

diagnostics:
  enabled: false

serviceMonitor:
  enabled: true
  interval: 30s
  labels:
    release: prometheus
  include:
    defaultMetrics: true
    apiEndpoints: true
    queueMetrics: true
