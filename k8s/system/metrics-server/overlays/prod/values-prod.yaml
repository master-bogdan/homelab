fullnameOverride: metrics-server

apiService:
  create: true
  insecureSkipTLSVerify: false

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

tls:
  type: cert-manager
  certManager:
    existingIssuer:
      enabled: true
      kind: ClusterIssuer
      name: homelab-ca

resources:
  requests:
    cpu: 100m
    memory: 200Mi
