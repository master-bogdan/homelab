fullnameOverride: metrics-server

apiService:
  create: true
  insecureSkipTLSVerify: true

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

args:
  - --kubelet-insecure-tls

resources:
  requests:
    cpu: 100m
    memory: 200Mi
