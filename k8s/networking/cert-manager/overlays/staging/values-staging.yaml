crds:
  enabled: true
  keep: true

global:
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

nodeSelector:
  kubernetes.io/os: linux
  node-role.kubernetes.io/control-plane: ""

tolerations:
