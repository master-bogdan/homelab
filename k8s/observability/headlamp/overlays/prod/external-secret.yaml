apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: headlamp-auth-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-prod
  target:
    name: headlamp-auth-prod
    creationPolicy: Owner
  data:
    - secretKey: client_id
      remoteRef:
        key: kv/prod/headlamp
        property: oidc_client_id
    - secretKey: client_secret
      remoteRef:
        key: kv/prod/headlamp
        property: oidc_client_secret
