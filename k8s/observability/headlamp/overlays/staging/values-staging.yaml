fullnameOverride: headlamp

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false

env:
  - name: OIDC_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: headlamp-auth-staging
        key: client_id
  - name: OIDC_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: headlamp-auth-staging
        key: client_secret
  - name: OIDC_ISSUER_URL
    value: "https://auth.apps.10-96-11-221.sslip.io/application/o/headlamp/"
  - name: OIDC_SCOPES
    value: "openid profile email groups"
  - name: OIDC_CALLBACK_URL
    value: "https://headlamp.apps.10-96-11-221.sslip.io/oidc-callback"

config:
  oidc:
    secret:
      create: false
  extraArgs:
    - -oidc-client-id=$(OIDC_CLIENT_ID)
    - -oidc-client-secret=$(OIDC_CLIENT_SECRET)
    - -oidc-idp-issuer-url=$(OIDC_ISSUER_URL)
    - -oidc-scopes=$(OIDC_SCOPES)
    - -oidc-callback-url=$(OIDC_CALLBACK_URL)
    - -oidc-ca-file=/etc/headlamp/oidc-ca/ca.crt

clusterRoleBinding:
  create: false

volumes:
  - name: oidc-ca
    secret:
      secretName: headlamp-oidc-ca

volumeMounts:
  - name: oidc-ca
    mountPath: /etc/headlamp/oidc-ca
    readOnly: true

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
